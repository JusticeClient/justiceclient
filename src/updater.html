<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Justice Launcher — Updating</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg0:#08060e;--bg1:#0e0b18;--bg2:#141020;--bg3:#1c1730;--bg4:#231e3a;
      --border:rgba(139,92,246,0.12);--border-hi:rgba(139,92,246,0.35);
      --purple:#a78bfa;--purple-hi:#c4b5fd;--purple-dim:#7c3aed;
      --accent:#e879f9;--green:#4ade80;--amber:#fbbf24;--red:#f87171;
      --t1:#ffffff;--t2:#e2e0e7;--t3:#a09aad;--t4:#6b6578;
      --glass-bg:rgba(20,10,30,0.6);
    }
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Space Grotesk',sans-serif;
      background:var(--bg0);
      color:var(--t1);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      user-select:none;
      position:relative;
    }

    /* Animated background */
    .bg-gradient{
      position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse 80% 60% at 50% 40%, rgba(124,58,237,0.15), transparent 70%),
                 radial-gradient(ellipse 60% 50% at 20% 80%, rgba(232,121,249,0.08), transparent 60%),
                 radial-gradient(ellipse 50% 40% at 80% 20%, rgba(96,165,250,0.06), transparent 60%),
                 var(--bg0);
    }

    /* Floating particles */
    .particles{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .particle{
      position:absolute;
      width:2px;height:2px;
      background:var(--purple);
      border-radius:50%;
      opacity:0;
      animation:float-up linear infinite;
    }
    @keyframes float-up{
      0%{transform:translateY(100vh) scale(0);opacity:0}
      10%{opacity:0.6}
      90%{opacity:0.6}
      100%{transform:translateY(-10vh) scale(1);opacity:0}
    }

    /* Titlebar */
    #titlebar{
      position:fixed;top:0;left:0;right:0;
      display:flex;align-items:center;justify-content:space-between;
      height:40px;padding:0 16px;
      background:rgba(8,6,14,0.8);
      border-bottom:1px solid var(--border);
      -webkit-app-region:drag;
      z-index:100;
    }
    .tl-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;letter-spacing:.06em}
    .tl-logo-text{background:linear-gradient(90deg,var(--purple-hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .gem{width:18px;height:18px;background:linear-gradient(135deg,var(--purple-dim),var(--accent));clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);box-shadow:0 0 12px rgba(167,139,250,.5)}
    .win-ctrl{display:flex;gap:4px;-webkit-app-region:no-drag}
    .wb{width:36px;height:28px;border:none;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--t3);transition:all .2s}
    .wb:hover{background:rgba(255,255,255,.1);color:var(--t1)}

    /* Main content */
    .updater-container{
      position:relative;z-index:1;
      display:flex;flex-direction:column;
      align-items:center;gap:32px;
      padding:40px;
      max-width:480px;
      width:100%;
    }

    /* Logo animation */
    .logo-wrap{
      position:relative;
      width:100px;height:100px;
      display:flex;align-items:center;justify-content:center;
    }
    .logo-gem{
      width:60px;height:60px;
      background:linear-gradient(135deg,var(--purple-dim),var(--accent));
      clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);
      box-shadow:0 0 40px rgba(167,139,250,.4);
      animation:gem-pulse 2s ease-in-out infinite;
      z-index:2;
      position:relative;
    }
    @keyframes gem-pulse{
      0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(167,139,250,.4)}
      50%{transform:scale(1.08);box-shadow:0 0 60px rgba(167,139,250,.6)}
    }
    .logo-ring{
      position:absolute;inset:-8px;
      border:2px solid rgba(167,139,250,0.2);
      border-radius:50%;
      animation:ring-spin 8s linear infinite;
    }
    .logo-ring::before{
      content:'';position:absolute;top:-3px;left:50%;
      width:6px;height:6px;
      background:var(--purple);
      border-radius:50%;
      transform:translateX(-50%);
      box-shadow:0 0 10px var(--purple);
    }
    .logo-ring-outer{
      position:absolute;inset:-18px;
      border:1px solid rgba(167,139,250,0.08);
      border-radius:50%;
      animation:ring-spin 12s linear infinite reverse;
    }
    .logo-ring-outer::before{
      content:'';position:absolute;bottom:-2px;left:50%;
      width:4px;height:4px;
      background:var(--accent);
      border-radius:50%;
      transform:translateX(-50%);
      box-shadow:0 0 8px var(--accent);
    }
    @keyframes ring-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

    /* Text */
    .update-title{
      font-size:24px;font-weight:800;
      letter-spacing:.04em;
      background:linear-gradient(90deg,var(--purple-hi),var(--accent));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-align:center;
    }
    .update-subtitle{
      font-size:14px;color:var(--t3);
      text-align:center;
      margin-top:-16px;
      line-height:1.5;
    }

    /* Progress bar */
    .progress-wrap{
      width:100%;
      display:flex;flex-direction:column;gap:10px;
    }
    .progress-bar-outer{
      width:100%;height:8px;
      background:rgba(139,92,246,0.1);
      border-radius:10px;
      overflow:hidden;
      border:1px solid var(--border);
    }
    .progress-bar-inner{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--purple-dim),var(--accent));
      border-radius:10px;
      transition:width 0.3s ease;
      position:relative;
      box-shadow:0 0 12px rgba(167,139,250,.3);
    }
    .progress-bar-inner::after{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
      animation:shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer{
      0%{transform:translateX(-100%)}
      100%{transform:translateX(100%)}
    }
    .progress-info{
      display:flex;justify-content:space-between;align-items:center;
    }
    .progress-status{font-size:13px;color:var(--t3);font-weight:500}
    .progress-percent{font-size:13px;color:var(--purple-hi);font-weight:700;font-variant-numeric:tabular-nums}

    /* Indeterminate state */
    .progress-bar-inner.indeterminate{
      width:30% !important;
      animation:indeterminate 1.5s ease-in-out infinite;
    }
    @keyframes indeterminate{
      0%{margin-left:0%;width:30%}
      50%{margin-left:35%;width:40%}
      100%{margin-left:70%;width:30%}
    }

    /* Version info */
    .version-info{
      display:flex;align-items:center;gap:12px;
      padding:12px 20px;
      background:var(--glass-bg);
      border:1px solid var(--border);
      border-radius:12px;
      backdrop-filter:blur(12px);
    }
    .ver-tag{
      font-size:12px;font-weight:700;
      padding:4px 10px;border-radius:6px;
      letter-spacing:.06em;
    }
    .ver-old{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.25)}
    .ver-arrow{color:var(--t4);font-size:16px}
    .ver-new{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid rgba(74,222,128,0.25)}

    /* States */
    .state-checking .progress-bar-inner{width:0%}
    .state-downloading .progress-bar-inner{transition:width 0.3s ease}
    .state-installing .progress-bar-inner{width:100% !important}
    .state-done .logo-gem{animation:none;box-shadow:0 0 50px rgba(74,222,128,.4);background:linear-gradient(135deg,#16a34a,#4ade80)}
    .state-error .logo-gem{animation:none;box-shadow:0 0 50px rgba(248,113,113,.4);background:linear-gradient(135deg,#dc2626,#f87171)}

    /* Error / retry */
    .error-box{
      display:none;
      flex-direction:column;align-items:center;gap:12px;
      padding:16px 24px;
      background:rgba(248,113,113,0.08);
      border:1px solid rgba(248,113,113,0.2);
      border-radius:12px;
      width:100%;
    }
    .state-error .error-box{display:flex}
    .error-msg{font-size:13px;color:var(--red);text-align:center}
    .retry-btn{
      padding:10px 28px;border-radius:10px;border:none;
      background:linear-gradient(135deg,var(--purple-dim),var(--accent));
      color:#fff;font-family:'Space Grotesk',sans-serif;
      font-size:14px;font-weight:700;cursor:pointer;
      transition:all .2s;
    }
    .retry-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(167,139,250,.4)}

    /* Changelog teaser */
    .changelog{
      width:100%;max-height:100px;
      overflow-y:auto;
      padding:12px 16px;
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:10px;
      font-size:12px;color:var(--t3);
      line-height:1.6;
    }
    .changelog::-webkit-scrollbar{width:3px}
    .changelog::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
    .changelog-title{font-weight:700;color:var(--t2);margin-bottom:4px;font-size:13px}
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="particles" id="particles"></div>

  <div id="titlebar">
    <div class="tl-logo">
      <div class="gem"></div>
      <span class="tl-logo-text">JUSTICE</span>
    </div>
    <div class="win-ctrl" id="win-ctrl">
      <button class="wb mn" onclick="require('electron').ipcRenderer.send('window-minimize')" title="Minimize">
        <svg width="12" height="1" viewBox="0 0 12 1"><rect width="12" height="1" fill="currentColor"/></svg>
      </button>
      <button class="wb cl" onclick="require('electron').ipcRenderer.send('window-close')" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="updater-container" id="updater">
    <!-- Animated logo -->
    <div class="logo-wrap">
      <div class="logo-ring-outer"></div>
      <div class="logo-ring"></div>
      <div class="logo-gem"></div>
    </div>

    <!-- Title -->
    <h1 class="update-title" id="update-title">Checking for Updates</h1>
    <p class="update-subtitle" id="update-subtitle">Please wait while we check for the latest version...</p>

    <!-- Version info (hidden until we know versions) -->
    <div class="version-info" id="version-info" style="display:none">
      <span class="ver-tag ver-old" id="ver-old">v1.0.0</span>
      <span class="ver-arrow">→</span>
      <span class="ver-tag ver-new" id="ver-new">v1.0.1</span>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar-outer">
        <div class="progress-bar-inner indeterminate" id="progress-bar"></div>
      </div>
      <div class="progress-info">
        <span class="progress-status" id="progress-status">Checking...</span>
        <span class="progress-percent" id="progress-percent"></span>
      </div>
    </div>

    <!-- Error state -->
    <div class="error-box">
      <p class="error-msg" id="error-msg">Something went wrong. Please try again.</p>
      <button class="retry-btn" onclick="retryUpdate()">Retry</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const titleEl = document.getElementById('update-title');
    const subtitleEl = document.getElementById('update-subtitle');
    const progressBar = document.getElementById('progress-bar');
    const statusEl = document.getElementById('progress-status');
    const percentEl = document.getElementById('progress-percent');
    const versionInfo = document.getElementById('version-info');
    const verOld = document.getElementById('ver-old');
    const verNew = document.getElementById('ver-new');
    const errorMsg = document.getElementById('error-msg');
    const updater = document.getElementById('updater');

    // Create floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
      p.style.background = Math.random() > 0.5 ? 'var(--purple)' : 'var(--accent)';
      particlesContainer.appendChild(p);
    }

    // Hide window controls on macOS
    if (process.platform === 'darwin') {
      document.getElementById('win-ctrl').style.display = 'none';
      document.getElementById('titlebar').style.paddingLeft = '80px';
    }

    // Listen for update events from main process
    ipcRenderer.on('update-checking', () => {
      setState('checking');
      titleEl.textContent = 'Checking for Updates';
      subtitleEl.textContent = 'Please wait while we check for the latest version...';
      statusEl.textContent = 'Connecting...';
      percentEl.textContent = '';
      progressBar.className = 'progress-bar-inner indeterminate';
    });

    ipcRenderer.on('update-found', (e, { current, latest }) => {
      verOld.textContent = 'v' + current;
      verNew.textContent = 'v' + latest;
      versionInfo.style.display = 'flex';
      titleEl.textContent = 'Updating Justice Launcher';
      subtitleEl.textContent = 'A new version is available. Downloading now...';
    });

    ipcRenderer.on('update-download-progress', (e, { percent, transferred, total, speed }) => {
      setState('downloading');
      progressBar.className = 'progress-bar-inner';
      progressBar.style.width = percent.toFixed(1) + '%';
      percentEl.textContent = percent.toFixed(1) + '%';

      const mbTransferred = (transferred / 1048576).toFixed(1);
      const mbTotal = (total / 1048576).toFixed(1);
      const mbSpeed = speed ? (speed / 1048576).toFixed(1) : '—';
      statusEl.textContent = `${mbTransferred} MB / ${mbTotal} MB  •  ${mbSpeed} MB/s`;
    });

    ipcRenderer.on('update-download-complete', () => {
      setState('installing');
      titleEl.textContent = 'Installing Update';
      subtitleEl.textContent = 'Almost done! The launcher will restart automatically...';
      statusEl.textContent = 'Installing...';
      percentEl.textContent = '100%';
      progressBar.className = 'progress-bar-inner';
      progressBar.style.width = '100%';
    });

    ipcRenderer.on('update-error', (e, { message }) => {
      setState('error');
      titleEl.textContent = 'Update Failed';
      subtitleEl.textContent = '';
      errorMsg.textContent = message || 'Something went wrong. Please try again.';
    });

    ipcRenderer.on('update-not-needed', () => {
      // No update needed, main process will load the launcher
      titleEl.textContent = 'You\'re Up to Date!';
      subtitleEl.textContent = 'Loading Justice Launcher...';
      statusEl.textContent = 'Launching...';
      progressBar.className = 'progress-bar-inner';
      progressBar.style.width = '100%';
    });

    function setState(state) {
      updater.className = 'updater-container state-' + state;
    }

    function retryUpdate() {
      ipcRenderer.send('retry-update');
    }

    // Tell main process we're ready
    ipcRenderer.send('updater-ready');
  </script>
</body>
</html>
